<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic AI Content Factory</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --dark: #111; --card: #1a1a1a; }
        body { background: var(--dark); color: white; font-family: 'Poppins', sans-serif; text-align: center; padding: 10px; }
        .batch-controls { background: #222; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--gold); }
        input { padding: 10px; width: 80%; margin: 10px 0; border-radius: 5px; border: none; background: #333; color: white; }
        button { padding: 12px 20px; background: var(--gold); border: none; cursor: pointer; border-radius: 6px; font-weight: bold; margin: 5px; color: black; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .reel-card { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 12px; text-align: left; }
        .loading { color: var(--gold); display: none; font-weight: bold; margin-top: 10px; }
        .urdu-text { font-family: 'Noto Nastaliq Urdu', serif; direction: rtl; text-align: right; color: #00ffcc; line-height: 1.8; }
    </style>
</head>
<body>

<div class="batch-controls">
    <h2>🤖 Islamic AI Content Factory</h2>
    <input type="password" id="apiKey" placeholder="Paste Gemini API Key Here">
    <br>
    <button onclick="generateBatch()">🚀 Generate 5 New Posts</button>
    <p class="loading" id="loader">AI is writing content... Please wait...</p>
</div>

<div id="contentGrid" class="grid"></div>

<script>
let currentBatch = [];

async function generateBatch() {
    const key = document.getElementById('apiKey').value.trim();
    if(!key) return alert("Please paste your API Key first!");
    
    const loader = document.getElementById('loader');
    const grid = document.getElementById('contentGrid');
    
    loader.style.display = "block";
    loader.innerText = "Connecting to Gemini 3 AI...";
    grid.innerHTML = ""; 

    // FIXED URL: Using v1beta and gemini-3-flash
    const apiURL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash:generateContent?key=${key}`;

    const prompt = "Generate 5 Islamic Quiz questions. Return ONLY a valid JSON array. Format: [{\"en\":{\"q\":\"Question?\",\"a\":\"A\",\"options\":{\"A\":\"Ans1\",\"B\":\"Ans2\",\"C\":\"Ans3\",\"D\":\"Ans4\"},\"exp\":\"Explanation\"},\"ur\":{\"q\":\"سوال؟\",\"a\":\"A\",\"options\":{\"A\":\"جواب1\",\"B\":\"جواب2\",\"C\":\"جواب3\",\"D\":\"جواب4\"},\"exp\":\"وضاحت\"},\"hi\":{\"q\":\"Sawal?\",\"a\":\"A\",\"options\":{\"A\":\"Jawab1\",\"B\":\"Jawab2\",\"C\":\"Jawab3\",\"D\":\"Jawab4\"},\"exp\":\"Explanation\"}}]";

    try {
        const response = await fetch(apiURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: {
                    response_mime_type: "application/json" // Forces AI to give clean data
                }
            })
        });

        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error.message || "API Connection Failed");
        }

        const result = await response.json();
        const rawText = result.candidates[0].content.parts[0].text;
        
        currentBatch = JSON.parse(rawText);
        displayBatch();
        loader.style.display = "none";

    } catch (e) {
        console.error("DEBUG INFO:", e);
        loader.innerText = "❌ Error: " + e.message;
        alert("Error: " + e.message);
    }
}

function displayBatch() {
    const grid = document.getElementById('contentGrid');
    grid.innerHTML = currentBatch.map((item, i) => `
        <div class="reel-card">
            <h4 style="color:gold">Quiz #${i+1}</h4>
            <p><b>EN:</b> ${item.en.q}</p>
            <p class="urdu-text">${item.ur.q}</p>
            <p style="font-size: 0.8em; color: #bbb;"><b>HI:</b> ${item.hi.q}</p>
            <hr style="border: 0.1px solid #333;">
            <p>✅ <b>Ans:</b> ${item.en.a}) ${item.en.options[item.en.a]}</p>
            <button onclick="copyCaption(${i})">📝 Copy Caption</button>
        </div>
    `).join('');
}

function copyCaption(i) {
    const item = currentBatch[i];
    const text = `📌 Quiz: ${item.en.q}\n\n✅ Answer: ${item.en.a}) ${item.en.options[item.en.a]}\n\n💡 Info: ${item.en.exp}\n\n#islamicquiz #deen #knowledge`;
    navigator.clipboard.writeText(text);
    alert("Caption Copied!");
}
</script>
</body>
</html>
