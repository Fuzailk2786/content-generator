<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic AI Content Factory 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --dark: #0a0a0a; --accent: #00ffcc; }
        body { background: var(--dark); color: white; font-family: 'Poppins', sans-serif; text-align: center; margin: 0; padding: 10px; }
        .controls { background: #1a1a1a; padding: 20px; border-radius: 0 0 20px 20px; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        textarea { width: 90%; height: 80px; background: #222; color: var(--gold); border: 1px solid #444; border-radius: 10px; padding: 10px; margin: 10px 0; }
        button { padding: 12px 24px; background: var(--gold); border: none; cursor: pointer; border-radius: 8px; font-weight: bold; margin: 5px; color: black; }
        .btn-reel { background: var(--accent); }
        #status { color: var(--accent); margin: 10px; font-weight: bold; }
        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        canvas { display: none; margin: 20px auto; border-radius: 15px; border: 3px solid var(--gold); max-width: 95%; }
    </style>
</head>
<body>

<div class="controls">
    <h2>🕌 Islamic AI Content Factory</h2>
    <textarea id="jsonInput" placeholder="Paste JSON here..."></textarea><br>
    <button onclick="processData()">📸 Create Carousel</button>
    <button class="btn-reel" onclick="runVideoSequence()">🎬 Generate & Download Reel</button>
    <div id="status"></div>
</div>

<div id="previewGrid" class="preview-grid"></div>
<canvas id="mainCanvas" width="1080" height="1920"></canvas>

<script>
let currentData = null;
const bgImages = [
    "https://images.unsplash.com/photo-1542810634-71277d95dcbb?q=80&w=1080", 
    "https://images.unsplash.com/photo-1564769625905-50e93615e769?q=80&w=1080"
];

function processData() {
    const status = document.getElementById('status');
    try {
        let raw = document.getElementById('jsonInput').value.trim();
        raw = raw.replace(/```json|```/g, "").trim();
        currentData = JSON.parse(raw);
        status.innerText = "JSON Verified ✅";
        renderCarouselUI();
    } catch (e) {
        status.innerText = "❌ JSON Error!";
    }
}

function renderCarouselUI() {
    const grid = document.getElementById('previewGrid');
    grid.innerHTML = `
        <div class="card"><h4>Slide 1: Question</h4><button onclick="drawAndDownload(1)">Download</button></div>
        <div class="card"><h4>Slide 2: Options</h4><button onclick="drawAndDownload(2)">Download</button></div>
        <div class="card"><h4>Slide 3: Correct Ans</h4><button onclick="drawAndDownload(3)">Download</button></div>
        <div class="card"><h4>Slide 4: Explanation</h4><button onclick="drawAndDownload(4)">Download</button></div>
    `;
}

async function drawBase(ctx) {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = bgImages[0];
    return new Promise(resolve => {
        img.onload = () => {
            ctx.drawImage(img, 0, 0, 1080, 1920);
            ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
            ctx.fillRect(0, 0, 1080, 1920);
            ctx.strokeStyle = "gold";
            ctx.lineWidth = 20;
            ctx.strokeRect(40, 40, 1000, 1840);
            resolve();
        };
    });
}

async function drawAndDownload(num, isReel = false) {
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    await drawBase(ctx);
    
    ctx.textAlign = "center";
    const safeWidth = 850;

    if (num === 1) { 
        drawText(ctx, currentData.en.q, 540, 400, safeWidth, 60, "bold 60px Poppins", "#FFD700");
        drawText(ctx, currentData.ur.q, 540, 850, safeWidth, 90, "50px 'Noto Nastaliq Urdu'", "#00ffcc");
        drawText(ctx, currentData.hi.q, 540, 1350, safeWidth, 60, "45px Poppins", "white");
    } 
    else if (num === 2) {
        drawText(ctx, "CHOOSE THE OPTION", 540, 300, safeWidth, 70, "bold 65px Poppins", "#FFD700");
        const opts = currentData.en.options;
        drawText(ctx, `A) ${opts.A}`, 540, 600, safeWidth, 60, "50px Poppins", "white");
        drawText(ctx, `B) ${opts.B}`, 540, 750, safeWidth, 60, "50px Poppins", "white");
        drawText(ctx, `C) ${opts.C}`, 540, 900, safeWidth, 60, "50px Poppins", "white");
        drawText(ctx, `D) ${opts.D}`, 540, 1050, safeWidth, 60, "50px Poppins", "white");
    }
    else if (num === 3) {
        drawText(ctx, "CORRECT ANSWER", 540, 600, safeWidth, 80, "bold 80px Poppins", "#FFD700");
        let a = currentData.en.a;
        drawText(ctx, `${a}) ${currentData.en.options[a]}`, 540, 800, safeWidth, 80, "bold 70px Poppins", "white");
    }
    else if (num === 4) {
        drawText(ctx, "EXPLANATION", 540, 300, safeWidth, 70, "bold 60px Poppins", "#FFD700");
        drawText(ctx, currentData.en.exp, 540, 500, safeWidth, 55, "40px Poppins", "white");
        drawText(ctx, currentData.ur.exp, 540, 1200, safeWidth, 85, "40px 'Noto Nastaliq Urdu'", "#00ffcc");
    }

    const link = document.createElement('a');
    link.download = `Islamic_${isReel ? 'Reel' : 'Slide'}_${num}.png`;
    link.href = canvas.toDataURL();
    link.click();
}

async function runVideoSequence() {
    if(!currentData) return alert("Process JSON first!");
    const status = document.getElementById('status');
    status.innerText = "Generating Reel Slides...";
    for(let i=1; i<=3; i++) {
        await drawAndDownload(i, true);
        await new Promise(r => setTimeout(r, 500));
    }
    status.innerText = "Reel Slides Downloaded! ✅";
}

function drawText(ctx, text, x, y, maxWidth, lineHeight, font, color) {
    ctx.font = font;
    ctx.fillStyle = color;
    let words = text.split(' ');
    let line = '';
    let currentY = y;

    for (let n = 0; n < words.length; n++) {
        let testLine = line + words[n] + ' ';
        let metrics = ctx.measureText(testLine);
        if (metrics.width > maxWidth && n > 0) {
            ctx.fillText(line, x, currentY);
            line = words[n] + ' ';
            currentY += lineHeight;
        } else { line = testLine; }
    }
    ctx.fillText(line, x, currentY);
}
</script>
</body>
</html>
