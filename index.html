<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic Content Factory - Final Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --dark: #050505; }
        body { background: var(--dark); color: white; font-family: 'Poppins', sans-serif; text-align: center; margin: 0; padding: 10px; }
        .controls { background: #111; padding: 20px; border-radius: 0 0 20px 20px; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        textarea { width: 95%; height: 80px; background: #222; color: var(--gold); border: 1px solid #444; border-radius: 10px; padding: 10px; margin: 10px 0; }
        button { padding: 12px 20px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px; color: black; }
        canvas { display: block; margin: 20px auto; border-radius: 15px; border: 4px solid var(--gold); max-width: 95%; background: black; }
    </style>
</head>
<body>

<div class="controls">
    <h2>🕌 Islamic AI Content Factory</h2>
    <textarea id="jsonInput" placeholder="Paste JSON here..."></textarea><br>
    <button onclick="processData()">🎨 Process JSON</button>
    <button onclick="downloadAll()" style="background:#fff">📥 Download All Slides</button>
</div>

<div id="buttonArea" style="margin:10px;"></div>
<canvas id="mainCanvas" width="1080" height="1920"></canvas>

<script>
let currentData = null;

function processData() {
    try {
        let raw = document.getElementById('jsonInput').value.trim();
        raw = raw.replace(/```json|```/g, "").trim();
        currentData = JSON.parse(raw);
        renderButtons();
        drawSlide(1);
    } catch (e) {
        alert("JSON Error! Check your formatting.");
    }
}

function renderButtons() {
    const area = document.getElementById('buttonArea');
    area.innerHTML = `
        <button onclick="drawSlide(1)">Slide 1</button>
        <button onclick="drawSlide(2)">Slide 2</button>
        <button onclick="drawSlide(3)">Slide 3</button>
        <button onclick="drawSlide(4)">Slide 4</button>
    `;
}

async function drawSlide(num) {
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    
    // Reset Canvas
    ctx.fillStyle = "#0a0a0a";
    ctx.fillRect(0,0,1080,1920);
    
    // Draw Frame
    ctx.strokeStyle = "gold"; ctx.lineWidth = 30; ctx.strokeRect(60,60,960,1800);
    ctx.textAlign = "center";

    if (num === 1) {
        drawBoxText(ctx, "ENGLISH QUESTION", currentData.en.q, 450, "white", "bold 48px Poppins");
        drawBoxText(ctx, "اردو سوال", currentData.ur.q, 950, "#00ffcc", "60px 'Noto Nastaliq Urdu'");
        drawBoxText(ctx, "HINGLISH", currentData.hi.q, 1450, "#ddd", "42px Poppins");
    } 
    else if (num === 2) {
        drawBoxText(ctx, "CHOOSE THE OPTION", "", 250, "gold", "bold 60px Poppins");
        const opts = currentData.en.options;
        const urOpts = currentData.ur.options;
        ["A", "B", "C", "D"].forEach((l, i) => {
            let y = 550 + (i * 300);
            ctx.fillStyle = "white"; ctx.font = "bold 52px Poppins";
            ctx.fillText(`${l}) ${opts[l]}`, 540, y);
            ctx.fillStyle = "#00ffcc"; ctx.font = "34px 'Noto Nastaliq Urdu'";
            ctx.fillText(urOpts[l], 540, y + 80);
        });
    }
    else if (num === 3) {
        const a = currentData.en.a;
        drawBoxText(ctx, "CORRECT ANSWER", 600, "gold", "bold 80px Poppins");
        drawBoxText(ctx, "", `${a}) ${currentData.en.options[a]}`, 800, "white", "bold 70px Poppins");
        drawBoxText(ctx, "", currentData.ur.options[a], 1000, "#00ffcc", "65px 'Noto Nastaliq Urdu'");
    }
    else if (num === 4) {
        drawBoxText(ctx, "EXPLANATION", 300, "gold", "bold 60px Poppins");
        drawBoxText(ctx, "EN", currentData.en.exp, 550, "white", "36px Poppins");
        drawBoxText(ctx, "UR", currentData.ur.exp, 1050, "#00ffcc", "42px 'Noto Nastaliq Urdu'");
    }
}

function drawBoxText(ctx, label, text, y, color, font) {
    if(label) {
        ctx.fillStyle = "gold"; ctx.font = "bold 28px Poppins";
        ctx.fillText(label, 540, y - 80);
    }
    
    ctx.fillStyle = color; ctx.font = font;
    if(!text) return;

    let maxWidth = 800; // Restricted width to prevent overflow
    let words = text.split(' ');
    let line = '';
    let startY = y;
    let lineHeight = parseInt(font) * 1.4;
    
    for (let n = 0; n < words.length; n++) {
        let testLine = line + words[n] + ' ';
        if (ctx.measureText(testLine).width > maxWidth && n > 0) {
            ctx.fillText(line, 540, startY);
            line = words[n] + ' ';
            startY += lineHeight;
        } else { line = testLine; }
    }
    ctx.fillText(line, 540, startY);
}

async function downloadAll() {
    for(let i=1; i<=4; i++) {
        await drawSlide(i);
        const link = document.createElement('a');
        link.download = `Slide_${i}.jpg`;
        link.href = document.getElementById('mainCanvas').toDataURL("image/jpeg", 0.9);
        link.click();
        await new Promise(r => setTimeout(r, 1000));
    }
}
</script>
</body>
</html>
