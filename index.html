<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic Content Factory Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --dark: #111; }
        body { background: var(--dark); color: white; font-family: 'Poppins', sans-serif; text-align: center; margin: 0; padding: 10px; }
        .controls { background: #222; padding: 20px; border-radius: 0 0 20px 20px; border-bottom: 2px solid var(--gold); }
        textarea { width: 90%; height: 100px; background: #333; color: var(--gold); border: 1px solid #444; border-radius: 10px; padding: 10px; margin: 10px 0; font-family: monospace; }
        button { padding: 12px 20px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px; color: black; }
        .preview-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .slide-card { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; width: 280px; }
        canvas { display: none; margin: 20px auto; border-radius: 10px; border: 2px solid gold; max-width: 90%; }
        #status { color: #00ffcc; margin: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="controls">
    <h2>🕌 Islamic Reel & Carousel Factory</h2>
    <p style="font-size: 0.8em; color: #bbb;">Paste your Gemini JSON below and click Create</p>
    <textarea id="jsonInput" placeholder="Paste JSON starting with { and ending with }"></textarea><br>
    <button onclick="processData()">🎨 Create Carousel</button>
    <button onclick="generateVideoPreview()" style="background:#00ffcc;">🎬 Create Video Reel</button>
    <div id="status"></div>
</div>

<div id="previewArea" class="preview-area"></div>
<canvas id="genCanvas" width="1080" height="1350"></canvas>

<script>
let currentData = null;

function processData() {
    const status = document.getElementById('status');
    try {
        let raw = document.getElementById('jsonInput').value.trim();
        // Remove potential markdown backticks
        raw = raw.replace(/```json|```/g, "").trim();
        currentData = JSON.parse(raw);
        
        status.innerText = "JSON Loaded Successfully ✅";
        renderCarouselPreviews();
    } catch (e) {
        console.error(e);
        status.innerText = "❌ JSON Error: Check your formatting.";
        alert("Invalid JSON format. Please ensure you copied the entire block.");
    }
}

function renderCarouselPreviews() {
    const area = document.getElementById('previewArea');
    area.innerHTML = `
        <div class="slide-card"><h4>Slide 1: Question</h4><button onclick="downloadSlide(1)">📥 Download</button></div>
        <div class="slide-card"><h4>Slide 2: Options</h4><button onclick="downloadSlide(2)">📥 Download</button></div>
        <div class="slide-card"><h4>Slide 3: Answer</h4><button onclick="downloadSlide(3)">📥 Download</button></div>
        <div class="slide-card"><h4>Slide 4: Explanation</h4><button onclick="downloadSlide(4)">📥 Download</button></div>
    `;
}

function drawBackground(ctx) {
    ctx.fillStyle = "#0c0c0c";
    ctx.fillRect(0, 0, 1080, 1350);
    ctx.strokeStyle = "rgba(255, 215, 0, 0.4)";
    ctx.lineWidth = 40;
    ctx.strokeRect(60, 60, 960, 1230);
    
    // Islamic Symbol Watermark
    ctx.fillStyle = "rgba(255, 215, 0, 0.03)";
    ctx.font = "400px Poppins";
    ctx.textAlign = "center";
    ctx.fillText("☪", 540, 800);
}

function downloadSlide(num) {
    if (!currentData) return alert("Please process JSON first!");
    const canvas = document.getElementById('genCanvas');
    const ctx = canvas.getContext('2d');
    
    drawBackground(ctx);
    ctx.textAlign = "center";
    ctx.fillStyle = "white";

    if (num === 1) {
        ctx.fillStyle = "#FFD700"; ctx.font = "bold 55px Poppins";
        wrapText(ctx, currentData.en.q, 540, 300, 850, 75);
        ctx.fillStyle = "#00ffcc"; ctx.font = "45px 'Noto Nastaliq Urdu'";
        wrapText(ctx, currentData.ur.q, 540, 650, 850, 90);
        ctx.fillStyle = "white"; ctx.font = "40px Poppins";
        wrapText(ctx, currentData.hi.q, 540, 1000, 850, 65);
    } 
    else if (num === 2) {
        ctx.fillStyle = "#FFD700"; ctx.font = "bold 60px Poppins";
        ctx.fillText("CHOOSE THE CORRECT OPTION", 540, 250);
        ctx.font = "50px Poppins"; ctx.fillStyle = "white";
        let opts = currentData.en.options;
        ctx.fillText("A) " + opts.A, 540, 500);
        ctx.fillText("B) " + opts.B, 540, 650);
        ctx.fillText("C) " + opts.C, 540, 800);
        ctx.fillText("D) " + opts.D, 540, 950);
    }
    else if (num === 3) {
        ctx.fillStyle = "#FFD700"; ctx.font = "bold 80px Poppins";
        ctx.fillText("CORRECT ANSWER", 540, 400);
        let ans = currentData.en.a;
        ctx.fillStyle = "white"; ctx.font = "bold 70px Poppins";
        ctx.fillText(ans + ") " + currentData.en.options[ans], 540, 600);
    }
    else if (num === 4) {
        ctx.fillStyle = "#FFD700"; ctx.font = "bold 60px Poppins";
        ctx.fillText("EXPLANATION", 540, 250);
        ctx.fillStyle = "white"; ctx.font = "35px Poppins";
        wrapText(ctx, currentData.en.exp, 540, 450, 850, 55);
        ctx.fillStyle = "#00ffcc"; ctx.font = "35px 'Noto Nastaliq Urdu'";
        wrapText(ctx, currentData.ur.exp, 540, 850, 850, 75);
    }

    const link = document.createElement('a');
    link.download = `Slide_${num}.png`;
    link.href = canvas.toDataURL();
    link.click();
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    if (!text) return;
    let words = text.split(' ');
    let line = '';
    for (let n = 0; n < words.length; n++) {
        let testLine = line + words[n] + ' ';
        if (ctx.measureText(testLine).width > maxWidth && n > 0) {
            ctx.fillText(line, x, y);
            line = words[n] + ' ';
            y += lineHeight;
        } else { line = testLine; }
    }
    ctx.fillText(line, x, y);
}

function generateVideoPreview() {
    if (!currentData) return alert("Please process JSON first!");
    const canvas = document.getElementById('genCanvas');
    canvas.style.display = "block";
    let i = 1;
    const status = document.getElementById('status');
    
    const interval = setInterval(() => {
        status.innerText = `🎥 Displaying Slide ${i} / 4...`;
        downloadSlide(i); 
        i++;
        if (i > 4) {
            clearInterval(interval);
            status.innerText = "✅ Video Cycle Complete. Screen record to save!";
        }
    }, 3000);
}
</script>
</body>
</html>
