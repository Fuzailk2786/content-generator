<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic Post Creator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --dark: #111; }
        body { background: var(--dark); color: white; font-family: 'Poppins', sans-serif; text-align: center; padding: 20px; }
        textarea { width: 90%; height: 150px; background: #222; color: #FFD700; border: 1px solid var(--gold); border-radius: 10px; padding: 15px; }
        .controls { margin: 20px 0; }
        button { padding: 15px 30px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .preview-card { background: #1a1a1a; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: left; border: 1px solid #333; }
        .urdu { font-family: 'Noto Nastaliq Urdu'; direction: rtl; text-align: right; color: #00ffcc; font-size: 1.2em; }
        canvas { display: none; }
    </style>
</head>
<body>

    <h2>🕌 Manual Islamic Content Factory</h2>
    <p>Ask Gemini on your phone for a quiz JSON, then paste it here:</p>
    
    <textarea id="manualInput" placeholder="Paste JSON here..."></textarea>
    
    <div class="controls">
        <button onclick="processContent()">🎨 Create Visuals</button>
    </div>

    <div id="output"></div>
    <canvas id="canvas" width="1080" height="1350"></canvas>

<script>
let currentData;

function processContent() {
    try {
        const raw = document.getElementById('manualInput').value;
        currentData = JSON.parse(raw.replace(/```json|```/g, ""));
        const item = Array.isArray(currentData) ? currentData[0] : currentData;
        
        document.getElementById('output').innerHTML = `
            <div class="preview-card">
                <h3>Ready for Export:</h3>
                <p><b>EN:</b> ${item.en.q}</p>
                <div class="urdu">${item.ur.q}</div>
                <hr>
                <button onclick="saveSlide('Q')">📥 Download Question Slide</button>
                <button onclick="saveSlide('A')">📥 Download Answer Slide</button>
                <button onclick="copyTags()">📝 Copy Caption</button>
            </div>
        `;
    } catch (e) {
        alert("Please paste valid JSON from Gemini.");
    }
}

function saveSlide(type) {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const item = Array.isArray(currentData) ? currentData[0] : currentData;

    ctx.fillStyle = "#111";
    ctx.fillRect(0,0,1080,1350);
    ctx.strokeStyle = "#FFD700"; ctx.lineWidth = 40; ctx.strokeRect(60,60,960,1230);
    
    ctx.textAlign = "center"; ctx.fillStyle = "white";
    
    if(type === 'Q') {
        ctx.font = "bold 60px Poppins";
        ctx.fillText(item.en.q, 540, 400);
        ctx.font = "50px Poppins";
        ctx.fillText("A) "+item.en.options.A, 540, 700);
        ctx.fillText("B) "+item.en.options.B, 540, 800);
    } else {
        ctx.fillStyle = "#FFD700"; ctx.font = "bold 80px Poppins";
        ctx.fillText("CORRECT ANSWER", 540, 400);
        ctx.fillStyle = "white"; ctx.fillText(item.en.a + ") " + item.en.options[item.en.a], 540, 600);
    }

    const link = document.createElement('a');
    link.download = `Islamic_Post_${type}.png`;
    link.href = canvas.toDataURL();
    link.click();
}

function copyTags() {
    const item = Array.isArray(currentData) ? currentData[0] : currentData;
    const text = `${item.en.q}\n\nAnswer: ${item.en.a}\n\n#islamicquiz #deen #reelsindia`;
    navigator.clipboard.writeText(text);
    alert("Caption Copied!");
}
</script>
</body>
</html>
