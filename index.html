<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic Content Factory - Final Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --dark: #050505; }
        body { background: var(--dark); color: white; font-family: 'Poppins', sans-serif; text-align: center; margin: 0; padding: 10px; }
        .controls { background: #111; padding: 20px; border-radius: 0 0 20px 20px; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        textarea { width: 95%; height: 80px; background: #222; color: var(--gold); border: 1px solid #444; border-radius: 10px; padding: 10px; margin: 10px 0; }
        button { padding: 12px 20px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px; color: black; }
        canvas { display: block; margin: 20px auto; border-radius: 15px; border: 4px solid var(--gold); max-width: 95%; background: black; }
    </style>
</head>
<body>

<div class="controls">
    <h2>🕌 Islamic AI Content Factory</h2>
    <textarea id="jsonInput" placeholder="Paste JSON here..."></textarea><br>
    <button onclick="processData()">🎨 Process JSON</button>
    <button onclick="downloadAll()" style="background:#fff">📥 Download All Slides</button>
</div>

<div id="buttonArea" style="margin:10px;"></div>
<canvas id="mainCanvas" width="1080" height="1920"></canvas>

<script>
let currentData = null;

const bgImages = [
    "https://images.unsplash.com/photo-1542810634-71277d95dcbb?w=1080",
    "https://images.unsplash.com/photo-1564769625905-50e93615e769?w=1080",
    "https://images.unsplash.com/photo-1590076215667-875d4ef2d97e?w=1080"
];

function processData() {
    try {
        let raw = document.getElementById('jsonInput').value.trim();
        raw = raw.replace(/```json|```/g, "").trim();
        currentData = JSON.parse(raw);

        document.getElementById('status').innerText = "Alignment Fixed! Choose a slide below. ✅";
        renderButtons();
        drawSlide(1);
    } catch (e) {
        alert("JSON Error! Please ensure valid structure.");
    }
}

function renderButtons() {
    const area = document.getElementById('buttonArea');
    area.innerHTML = `
        <button onclick="drawSlide(1)">Slide 1: Q</button>
        <button onclick="drawSlide(2)">Slide 2: Options</button>
        <button onclick="drawSlide(3)">Slide 3: Answer</button>
        <button onclick="drawSlide(4)">Slide 4: Explanation</button>
    `;
}

async function drawSlide(num) {
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');

    // Clear
    ctx.fillStyle = "black";
    ctx.fillRect(0,0,1080,1920);

    // Safe background loading (FIXED)
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = bgImages[num % bgImages.length];

    await new Promise(resolve => {
        img.onload = resolve;
        img.onerror = resolve; // fallback if image fails
        setTimeout(resolve, 1500); // safety timeout
    });

    try {
        ctx.globalAlpha = 0.35;
        ctx.drawImage(img, 0, 0, 1080, 1920);
        ctx.globalAlpha = 1.0;
    } catch {}

    // Frame
    ctx.strokeStyle = "gold";
    ctx.lineWidth = 30;
    ctx.strokeRect(60,60,960,1800);

    ctx.textAlign = "center";

    if (num === 1) {
        drawSection(ctx, "ENGLISH", currentData.en.q, 400, "white", "bold 50px Poppins");
        drawSection(ctx, "اردو", currentData.ur.q, 900, "#00ffcc", "60px 'Noto Nastaliq Urdu'");
        drawSection(ctx, "HINGLISH", currentData.hi.q, 1400, "#ddd", "45px Poppins");
    } 
    else if (num === 2) {
        drawSection(ctx, "CHOOSE THE CORRECT OPTION", "", 250, "gold", "bold 60px Poppins");

        const opts = currentData.en.options;
        const urOpts = currentData.ur.options;

        ["A","B","C","D"].forEach((l, i) => {
            let y = 500 + (i * 300);

            drawWrappedText(ctx, `${l}) ${opts[l]}`, 540, y, 800, "bold 50px Poppins", "white");
            drawWrappedText(ctx, urOpts[l], 540, y + 70, 800, "40px 'Noto Nastaliq Urdu'", "#00ffcc");
            drawWrappedText(ctx, currentData.hi.options[l], 540, y + 130, 800, "35px Poppins", "#aaa");
        });
    }
    else if (num === 3) {
        const a = currentData.en.a;

        drawSection(ctx, "CORRECT ANSWER", "", 400, "gold", "bold 80px Poppins");

        drawWrappedText(ctx, `${a}) ${currentData.en.options[a]}`, 540, 650, 800, "bold 65px Poppins", "white");
        drawWrappedText(ctx, currentData.ur.options[a], 540, 1000, 800, "60px 'Noto Nastaliq Urdu'", "#00ffcc");
        drawWrappedText(ctx, currentData.hi.options[a], 540, 1400, 800, "50px Poppins", "#ddd");
    }
    else if (num === 4) {
        drawSection(ctx, "EXPLANATION", "", 250, "gold", "bold 60px Poppins");

        drawWrappedText(ctx, currentData.en.exp, 540, 450, 850, "40px Poppins", "white");
        drawWrappedText(ctx, currentData.ur.exp, 540, 950, 850, "45px 'Noto Nastaliq Urdu'", "#00ffcc");
        drawWrappedText(ctx, currentData.hi.exp, 540, 1450, 850, "40px Poppins", "#ddd");
    }
}

function drawSection(ctx, label, text, y, color, font) {
    if(label){
        ctx.fillStyle = "rgba(255,215,0,0.8)";
        ctx.font = "bold 28px Poppins";
        ctx.fillText(label, 540, y - 70);
    }
    drawWrappedText(ctx, text, 540, y, 850, font, color);
}

// 🔥 FIXED TEXT WRAP FUNCTION
function drawWrappedText(ctx, text, x, y, maxWidth, font, color) {
    if(!text) return;

    ctx.fillStyle = color;
    ctx.font = font;

    const words = text.split(' ');
    let line = '';
    let lineHeight = getLineHeight(font);

    for(let i = 0; i < words.length; i++){
        const testLine = line + words[i] + ' ';
        if(ctx.measureText(testLine).width > maxWidth && i > 0){
            ctx.fillText(line, x, y);
            line = words[i] + ' ';
            y += lineHeight;
        } else {
            line = testLine;
        }
    }
    ctx.fillText(line, x, y);
}

// 🔥 SAFE FONT HEIGHT FIX
function getLineHeight(font) {
    const size = font.match(/\d+/);
    return size ? parseInt(size[0]) * 1.4 : 50;
}

async function downloadAll() {
    for(let i=1;i<=4;i++){
        await drawSlide(i);
        const link = document.createElement('a');
        link.download = `Slide_${i}.jpg`;
        link.href = document.getElementById('mainCanvas').toDataURL("image/jpeg", 0.9);
        link.click();
        await new Promise(r=>setTimeout(r,500));
    }
}

function copyCaption() {
    const d = currentData.en;
    const text = `❓ ${d.q}\n\n✅ ${d.a}) ${d.options[d.a]}\n\n💡 ${d.exp}\n\n#islamicquiz #deen #knowledge`;
    navigator.clipboard.writeText(text);
    alert("Caption Copied!");
}
</script>
</body>
</html>
